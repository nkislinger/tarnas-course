Lecture One: Who Is Richard Tarnas?

Before engaging with Tarnas's ideas, it is worth understanding who he actually is — because the usual mental image conjured by the word "astrologer" is not accurate here.

Richard Theodore Tarnas was born in 1950 in Geneva, Switzerland. He entered Harvard University in 1968 and graduated cum laude in 1972. He completed a PhD at Saybrook Institute in 1976, with a thesis focused on psychedelic therapy and the theoretical implications of LSD research for psychology.

In 1974, he traveled to Esalen Institute in Big Sur, California, to study with the Czech-American psychiatrist Stanislav Grof — one of the twentieth century's leading researchers into non-ordinary states of consciousness. Tarnas would remain at Esalen for a decade, eventually serving as its director of programs. During those years, his intellectual companions included Joseph Campbell, Gregory Bateson, Elizabeth Kübler-Ross, and James Hillman — a constellation of thinkers working at the intersection of depth psychology, mythology, and a critique of scientific rationalism.

Tarnas left Esalen in 1984 and spent the next six years writing what would become his first book: The Passion of the Western Mind. Published in 1991, it became a bestseller and remained in use at universities for decades. It contains no astrology whatsoever. It is simply a masterful narrative history of Western thought — from ancient Greece through postmodernism — praised by Joseph Campbell, cited by astronaut Susan Helms as one of the books that inspired her career, and widely regarded as one of the finest intellectual histories of its kind.

Only after that — only after establishing this scholarly foundation — did Tarnas publish his explicitly astrological work: Prometheus the Awakener in 1995, and Cosmos and Psyche in 2006, the result of thirty years of research.

This sequence matters. Tarnas is not a believer-first astrologer reaching for intellectual respectability. He is a historian and philosopher who subjected an anomalous hypothesis to three decades of scrutiny before presenting it publicly. Whether his conclusions hold is a separate question. But the character of his inquiry is serious, and it deserves serious engagement.

He is currently professor of philosophy and psychology at the California Institute of Integral Studies in San Francisco, and founding director of its graduate program in Philosophy, Cosmology, and Consciousness — a program that draws together transpersonal psychology, cosmology, and the philosophy of science.`

The Passion of the Western Mind, published in 1991, is where any serious engagement with Tarnas must begin. He has said so himself — and the architecture of his larger project makes clear why.

The book is a narrative history of Western thought, moving from Homeric cosmology through ancient Greece, the rise of Christianity, the medieval synthesis, the Scientific Revolution, the Enlightenment, Romanticism, Nietzsche, Freud, and into the fragmented twentieth century. It traces, with unusual clarity and sympathy, how Western human beings came to understand themselves and their place in the universe.

Tarnas does not romanticize the pre-modern world or dismiss science. His critique is more precise: the problem is not scientific method but a particular metaphysical assumption — the sharp Cartesian division between the knowing subject and the known world — that was elevated from a useful methodological stance into a metaphysical absolute.

This is the philosophical problem that archetypal astrology, for Tarnas, represents one possible approach to solving. The planets become, in his later work, potential evidence that the cosmos is indeed patterned in ways that resonate with the human psyche — that we are not, after all, accidental observers of a meaningless mechanism.

Before anything else in Tarnas's astrological work can be properly evaluated, one concept must be understood: the archetype. Not as a psychological buzzword or a Jungian cliché, but as a specific philosophical tradition with a two-and-a-half-thousand-year history.

The concept begins with Plato. For Plato, archetypes — or Forms — are the universal patterns from which all particular things in the world are derived. The Form of Beauty is not beautiful in the way a rose is beautiful; it is the universal structure of beauty itself, which particular beautiful things imperfectly instantiate. This is not merely poetic. It is a serious metaphysical claim: the world's particular appearances are grounded in universal, immaterial, eternally existing patterns.

Aristotle retained the concept of universal form but relocated it: for Aristotle, the form is not transcendent but immanent — it exists within things, as their organizing principle, their essential nature. The archetype becomes less a heavenly template and more an active pattern shaping things from within.

This tension between transcendent and immanent archetypes runs through the entire history of Western thought, emerging again in the medieval dispute between Realists and Nominalists, and recurring in the Romantic philosophy of Schelling and Goethe.

Carl Jung gave the concept its modern psychological form. For Jung, archetypes are universal patterns embedded in what he called the collective unconscious — a layer of the psyche shared across all humanity, not derived from individual experience. The archetypes manifest as recurring figures in dreams, myths, and art across cultures: the Hero, the Great Mother, the Shadow, the Self, the Trickster. They are not invented by individuals; they erupt into individual consciousness from a deeper common substrate.

Published in 2006 by Viking Press, Cosmos and Psyche: Intimations of a New World View is Richard Tarnas's primary scholarly statement. It is the result of thirty years of research. It is also, by his own acknowledgment, a deeply contested work.

Prometheus the Awakener, published in 1995 by Spring Publications, is a lean, focused essay of about a hundred pages. It addresses a specific scholarly problem that sits at the heart of Tarnas's broader project.

The problem is this. In 1781, the astronomer William Herschel discovered a new planet beyond Saturn, the first planet discovered in the modern era. It was eventually named Uranus after the Greek sky god — the primordial heaven, father of the Titans, castrated by his son Cronus and deposed from power. This naming was essentially arbitrary: Uranus was chosen partly because other planets bore Roman names of classical gods, and partly because Uranus was the father of Saturn, the next planet inward.

let currentTrack = 0;
let isPlaying = false;
let synth = window.speechSynthesis;
let utterance = null;
let voices = [];
let selectedVoice = null;
let speed = 1.0;
const speeds = [0.8, 1.0, 1.25, 1.5];
let speedIdx = 1;

// Progress tracking
let wordTokens = [];
let wordIndex = 0;
let charOffset = 0;
let progressInterval = null;
let startTime = null;
let totalEstimatedMs = 0;
let pausedAt = 0;
let elapsedBeforePause = 0;

function loadVoices() {
  voices = synth.getVoices().filter(v => v.lang.startsWith('en'));
  const sel = document.getElementById('voice-select');
  if (!sel) return;
  sel.innerHTML = '';
  voices.forEach((v, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = v.name + (v.default ? ' ★' : '');
    sel.appendChild(opt);
    if (!selectedVoice && (v.name.toLowerCase().includes('daniel') || v.name.toLowerCase().includes('alex') || v.name.toLowerCase().includes('karen') || v.default)) {
      selectedVoice = v;
      sel.value = i;
    }
  });
  if (!selectedVoice && voices.length) selectedVoice = voices[0];
}

synth.addEventListener('voiceschanged', loadVoices);
loadVoices();

function buildSidebar() {
  const sb = document.getElementById('sidebar');
  let currentPart = '';
  let html = '';
  TRACKS.forEach((t, i) => {
    if (t.part !== currentPart) {
      currentPart = t.part;
      html += `<div class="part-label">${t.part}</div>`;
    }
    const wc = t.text.split(/\s+/).length;
    const mins = Math.round(wc / 150);
    html += `<div class="track-item" id="ti-${i}" onclick="selectTrack(${i})">
      <span class="track-num">${t.num}</span>
      <div class="track-info">
        <div class="track-title">${t.title}</div>
        <div class="track-subtitle">${t.subtitle}</div>
        <div class="track-dur">~${mins} min</div>
      </div>
      <span class="play-indicator"></span>
    </div>`;
  });
  sb.innerHTML = html;
}

function renderModule(idx) {
  const t = TRACKS[idx];
  const display = document.getElementById('module-display');

  // Build word-span version of text
  const paras = t.text.split('\n\n').filter(p => p.trim());
  let wordHtml = '';
  let wIdx = 0;
  wordTokens = [];
  charOffset = 0;

  paras.forEach(para => {
    const words = para.trim().split(/(\s+)/);
    let paraHtml = '<p>';
    words.forEach(token => {
      if (/\S/.test(token)) {
        const wi = wIdx++;
        wordTokens.push({ token, idx: wi });
        paraHtml += `<span class="word" id="w${wi}">${token}</span>`;
      } else {
        paraHtml += token;
      }
    });
    paraHtml += '</p>';
    wordHtml += paraHtml;
  });

  display.innerHTML = `
    <div class="module-part">${t.part}</div>
    <div class="module-title-main">${t.title.includes('The Passion') || t.title.includes('Cosmos') || t.title.includes('Prometheus') ? '<em>' + t.title + '</em>' : t.title}</div>
    <div class="module-hook-main">${t.subtitle}</div>
    <div style="margin-bottom:1rem;">
      <div class="voice-select-row">
        <label for="voice-select">Voice</label>
        <select id="voice-select" onchange="changeVoice(this.value)"></select>
      </div>
    </div>
    <div class="transcript-label">Transcript</div>
    <div class="transcript-text" id="transcript-text">${wordHtml}</div>
  `;
  loadVoices();
  document.getElementById('np-title').textContent = `${t.num} — ${t.title}`;
  estimateDuration(t.text);
}

function estimateDuration(text) {
  const wordCount = text.split(/\s+/).length;
  const wpm = 150 * speed;
  totalEstimatedMs = (wordCount / wpm) * 60000;
  const mins = Math.floor(totalEstimatedMs / 60000);
  const secs = Math.floor((totalEstimatedMs % 60000) / 1000);
  document.getElementById('time-total').textContent = `~${mins}:${secs.toString().padStart(2,'0')}`;
}

function selectTrack(idx) {
  stopAudio();
  currentTrack = idx;
  wordIndex = 0;
  elapsedBeforePause = 0;
  document.querySelectorAll('.track-item').forEach(el => el.classList.remove('active', 'playing'));
  document.getElementById(`ti-${idx}`).classList.add('active');
  renderModule(idx);
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('time-current').textContent = '0:00';
  document.getElementById('btn-play').innerHTML = '&#9654;';
  isPlaying = false;
}

function changeVoice(idx) {
  selectedVoice = voices[parseInt(idx)];
  if (isPlaying) {
    const wasPlaying = true;
    stopAudio();
    if (wasPlaying) playAudio();
  }
}

function cycleSpeed() {
  speedIdx = (speedIdx + 1) % speeds.length;
  speed = speeds[speedIdx];
  document.getElementById('btn-speed').textContent = speed + '×';
  estimateDuration(TRACKS[currentTrack].text);
  if (isPlaying) {
    const elapsed = elapsedBeforePause + (Date.now() - startTime);
    elapsedBeforePause = elapsed;
    stopAudio(true);
    playAudio(true);
  }
}

function togglePlay() {
  if (!isPlaying) {
    playAudio();
  } else {
    pauseAudio();
  }
}

function playAudio(resume) {
  if (synth.speaking && !synth.paused) return;
  const t = TRACKS[currentTrack];

  if (synth.paused) {
    synth.resume();
    isPlaying = true;
    startTime = Date.now();
    startProgressTimer();
    document.getElementById('btn-play').innerHTML = '&#9646;&#9646;';
    document.getElementById(`ti-${currentTrack}`).classList.add('playing');
    return;
  }

  utterance = new SpeechSynthesisUtterance(t.text);
  utterance.rate = speed;
  utterance.pitch = 1.0;
  utterance.volume = 1.0;
  if (selectedVoice) utterance.voice = selectedVoice;

  utterance.onboundary = (e) => {
    if (e.name === 'word') {
      highlightWord(e.charIndex);
    }
  };

  utterance.onend = () => {
    isPlaying = false;
    stopProgressTimer();
    document.getElementById('btn-play').innerHTML = '&#9654;';
    document.getElementById('progress-fill').style.width = '100%';
    document.querySelectorAll('.track-item').forEach(el => el.classList.remove('playing'));
    clearHighlights();
    if (currentTrack < TRACKS.length - 1) {
      setTimeout(() => { selectTrack(currentTrack + 1); playAudio(); }, 800);
    }
  };

  utterance.onerror = () => {
    isPlaying = false;
    stopProgressTimer();
    document.getElementById('btn-play').innerHTML = '&#9654;';
  };

  synth.speak(utterance);
  isPlaying = true;
  startTime = Date.now();
  startProgressTimer();
  document.getElementById('btn-play').innerHTML = '&#9646;&#9646;';
  document.getElementById(`ti-${currentTrack}`).classList.add('playing');
}

function pauseAudio() {
  if (synth.speaking && !synth.paused) {
    synth.pause();
    elapsedBeforePause += Date.now() - startTime;
    isPlaying = false;
    stopProgressTimer();
    document.getElementById('btn-play').innerHTML = '&#9654;';
    document.getElementById(`ti-${currentTrack}`).classList.remove('playing');
  }
}

function stopAudio(silent) {
  synth.cancel();
  isPlaying = false;
  stopProgressTimer();
  if (!silent) {
    document.getElementById('btn-play').innerHTML = '&#9654;';
    document.querySelectorAll('.track-item').forEach(el => el.classList.remove('playing'));
    clearHighlights();
    elapsedBeforePause = 0;
  }
}

function highlightWord(charIdx) {
  clearHighlights();
  // Find word span closest to charIdx
  const text = TRACKS[currentTrack].text;
  let count = 0;
  const words = text.split(/\s+/);
  let pos = 0;
  let targetWord = 0;
  for (let i = 0; i < words.length; i++) {
    if (pos >= charIdx) { targetWord = i; break; }
    pos += words[i].length + 1;
    targetWord = i;
  }
  const el = document.getElementById('w' + targetWord);
  if (el) {
    el.classList.add('highlight');
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function clearHighlights() {
  document.querySelectorAll('.word.highlight').forEach(el => el.classList.remove('highlight'));
}

function startProgressTimer() {
  stopProgressTimer();
  progressInterval = setInterval(updateProgress, 300);
}

function stopProgressTimer() {
  if (progressInterval) { clearInterval(progressInterval); progressInterval = null; }
}

function updateProgress() {
  if (!isPlaying || !startTime) return;
  const elapsed = elapsedBeforePause + (Date.now() - startTime);
  const pct = Math.min(100, (elapsed / totalEstimatedMs) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  const secs = Math.floor(elapsed / 1000);
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  document.getElementById('time-current').textContent = m + ':' + s.toString().padStart(2,'0');
}

function seekTo(e) {
  const bar = document.getElementById('progress-bar');
  const rect = bar.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  elapsedBeforePause = pct * totalEstimatedMs;
  document.getElementById('progress-fill').style.width = (pct * 100) + '%';
  const secs = Math.floor(elapsedBeforePause / 1000);
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  document.getElementById('time-current').textContent = m + ':' + s.toString().padStart(2,'0');
  if (isPlaying) {
    stopAudio(true);
    playAudio(true);
  }
}

function prevTrack() {
  if (currentTrack > 0) { selectTrack(currentTrack - 1); }
}

function nextTrack() {
  if (currentTrack < TRACKS.length - 1) { selectTrack(currentTrack + 1); }
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  const tag = document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowRight' && !e.shiftKey) nextTrack();
  if (e.code === 'ArrowLeft' && !e.shiftKey) prevTrack();
  if (e.key === '>') { speedIdx = (speedIdx+1)%speeds.length; speed=speeds[speedIdx]; document.getElementById('btn-speed').textContent=speed+'×'; estimateDuration(TRACKS[currentTrack].text); }
});

// Cross-link notice in sidebar header
const crossLink = document.createElement('div');
crossLink.style.cssText = 'padding:0.8rem 1.4rem; font-family:"DM Mono",monospace; font-size:0.58rem; letter-spacing:0.08em; color:rgba(74,68,96,0.9); border-bottom:1px solid rgba(200,169,110,0.15); line-height:1.5;';
crossLink.innerHTML = 'Also available:<br><span style="color:rgba(107,143,163,0.8);">tarnas_astrology_course.html</span><br>Reading version with notes &amp; progress tracker';
document.getElementById('sidebar').prepend(crossLink);

// Init
buildSidebar();
selectTrack(0);
</script>
